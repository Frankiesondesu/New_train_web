<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="铁路旅行地图——探索中国铁路线路、车站、车次与沿途风景。" />
    <meta property="og:title" content="途轨 · 铁路旅行地图" />
    <meta property="og:description" content="探索中国铁路线路、车站、真实车次时刻与沿途旅行灵感。" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" id="theme-color" content="#fffefa" />
    <title>途轨 · 铁路旅行地图</title>
    <script>
      (() => {
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        try {
          const savedTheme = localStorage.getItem("tugui-theme");
          document.documentElement.dataset.theme = savedTheme || (systemDark ? "dark" : "light");
        } catch {
          document.documentElement.dataset.theme = systemDark ? "dark" : "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="styles.css?v=20260714-rail-split" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="途轨首页">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 28 28"><path d="M7 4h14v14a7 7 0 0 1-14 0V4Z"/><path d="M7 14h14M10 23l-3 3m11-3 3 3M10.5 9h.01M17.5 9h.01"/></svg>
        </span>
        <span><b>途轨</b><small>RAILSCAPE</small></span>
      </a>
      <form class="global-search" id="search-form" role="search">
        <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
        <input id="search-input" type="search" autocomplete="off" placeholder="搜索车站、线路或车次" aria-label="搜索车站、线路或车次" />
        <kbd>⌘ K</kbd>
        <div class="search-results" id="search-results" hidden></div>
      </form>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换到暗色模式" aria-pressed="false">
        <svg class="theme-icon sun-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.42 1.42m11.3 11.3 1.42 1.42M2 12h2m16 0h2M4.93 19.07l1.42-1.42m11.3-11.3 1.42-1.42"/></svg>
        <svg class="theme-icon moon-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.4A8.5 8.5 0 0 1 9.6 3.5 8.5 8.5 0 1 0 20.5 14.4Z"/></svg>
      </button>
      <nav class="main-nav" aria-label="主导航">
        <a class="active" href="#map-view">铁路地图</a>
        <a href="#inspiration">旅行灵感</a>
        <button class="saved-button" id="saved-button" type="button" aria-label="我的收藏">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12v18l-6-4-6 4V3Z"/></svg>
          <span>我的收藏</span>
        </button>
      </nav>
    </header>

    <main class="app-shell" id="map-view">
      <aside class="detail-panel" id="detail-panel" aria-live="polite">
        <div id="panel-content"></div>
      </aside>

      <section class="map-shell" aria-label="中国铁路旅行地图">
        <div id="map"></div>
        <div class="map-status" id="map-status" hidden>
          <div>
            <b id="map-status-title">地图加载异常</b>
            <p id="map-status-message">部分地图资源加载失败，已保留线路和车站信息。</p>
          </div>
          <button id="map-retry-button" type="button">重试</button>
        </div>

        <div class="map-toolbar" aria-label="线路筛选">
          <button class="filter-chip active" type="button" data-filter="all"><span class="filter-dot all"></span>全部线路</button>
          <button class="filter-chip" type="button" data-filter="highspeed"><span class="filter-dot highspeed"></span>高速铁路</button>
          <button class="filter-chip" type="button" data-filter="scenic"><span class="filter-dot scenic"></span>风景线路</button>
        </div>

        <div class="map-legend" aria-label="地图图例">
          <span><i class="legend-line highspeed"></i>高速铁路</span>
          <span><i class="legend-line scenic"></i>风景线路</span>
          <span><i class="legend-station"></i>主要车站</span>
        </div>

        <button class="mobile-panel-handle" id="mobile-panel-handle" type="button" aria-label="展开详情面板">
          <span></span><b id="mobile-panel-title">发现铁路旅行</b>
        </button>
      </section>
    </main>

    <template id="icon-template">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"></svg>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js?v=20260714-rail-split"></script>
  </body>
</html>
